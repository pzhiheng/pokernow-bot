<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokerNow Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --green:    #238636;
      --green-h:  #2ea043;
      --red:      #b91c1c;
      --red-h:    #dc2626;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --input-bg: #010409;
      --accent:   #1f6feb;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    header .logo { font-size: 32px; }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: var(--green); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
    }
    .card + .card { margin-top: 16px; }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input, .field textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Archetype grid ── */
    .archetype-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .archetype-header .card-title { margin-bottom: 0; }

    .random-btn {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .random-btn:hover { background: #30363d; }
    .random-btn.spin { animation: spin-once 0.4s ease; }
    @keyframes spin-once {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .archetypes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .archetype-card {
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      user-select: none;
    }
    .archetype-card:hover { border-color: #58a6ff; background: #0d1117; transform: translateY(-1px); }
    .archetype-card.active { border-color: var(--accent); background: #0c1929; }

    .archetype-card .avatar {
      font-size: 36px;
      line-height: 1;
      margin-bottom: 8px;
      display: block;
      transition: transform 0.2s;
    }
    .archetype-card:hover .avatar { transform: scale(1.1); }
    .archetype-card.active .avatar { animation: bounce 0.3s ease; }
    @keyframes bounce {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.2); }
    }

    .archetype-card .arch-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }
    .archetype-card .arch-tag {
      font-size: 10px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Launch button ── */
    .actions { display: flex; gap: 10px; margin-top: 22px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      transition: background 0.15s, opacity 0.15s;
    }
    #launchBtn { background: var(--green); color: #fff; flex: 1; }
    #launchBtn:hover:not(:disabled) { background: var(--green-h); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Running bots list ── */
    .bots-list { display: flex; flex-direction: column; gap: 10px; }

    .bot-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

    .bot-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
               box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; flex-shrink:0; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .bot-info { flex: 1; min-width: 0; }
    .bot-info .bot-name { font-size: 13px; font-weight: 700; }
    .bot-info .bot-url  { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .bot-tag { font-size: 11px; background: #21262d; border: 1px solid var(--border);
               border-radius: 4px; padding: 2px 8px; color: var(--muted); flex-shrink:0; }

    .stop-btn { background: var(--red); color:#fff; font-size:12px; padding: 6px 14px; flex-shrink:0; }
    .stop-btn:hover { background: var(--red-h); }

    .no-bots { font-size: 13px; color: var(--muted); text-align: center; padding: 14px 0; }

    /* ── Log panel ── */
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .log-header .card-title { margin-bottom: 0; }
    .clear-btn {
      background: #21262d; border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; padding: 4px 12px; border-radius: 6px;
    }
    .clear-btn:hover { background: #30363d; }

    .log-panel {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      height: 380px;
      overflow-y: auto;
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .log-line       { color: var(--muted); white-space: pre-wrap; word-break: break-all; }
    .log-line.info  { color: var(--text); }
    .log-line.good  { color: #3fb950; }
    .log-line.warn  { color: #d29922; }
    .log-line.err   { color: #f85149; }
    .log-line.action{ color: #79c0ff; font-weight: 600; }
    .log-line.gamelog{ color: #e3b341; }

    .bot-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      border-radius: 3px;
      padding: 0 5px;
      margin-right: 5px;
      opacity: 0.85;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🃏</span>
  <h1>Poker<span>Now</span> Bot</h1>
</header>

<!-- Config / Launch -->
<div class="card">
  <div class="card-title">Launch a Bot</div>

  <div class="field">
    <label>Table URL</label>
    <input id="tableUrl" type="url" placeholder="https://www.pokernow.com/games/..." />
  </div>

  <div class="row">
    <div class="field">
      <label>Bot Name</label>
      <input id="botName" type="text" placeholder="e.g. PokerBot" />
    </div>
    <div class="field">
      <label>Buy-in (chips)</label>
      <input id="stack" type="number" placeholder="e.g. 1000" min="1" />
    </div>
  </div>

  <!-- Archetypes -->
  <div class="field">
    <div class="archetype-header">
      <div class="card-title">Player Type</div>
      <button class="random-btn" id="randomBtn">🎲 Random</button>
    </div>

    <div class="archetypes" id="archetypes"></div>

    <label>AI Strategy Prompt</label>
    <textarea id="strategy" placeholder="Select a player type above or write your own..."></textarea>
  </div>

  <div class="actions">
    <button id="launchBtn">▶ Launch Bot</button>
  </div>
</div>

<!-- Running Bots -->
<div class="card">
  <div class="card-title">Running Bots</div>
  <div class="bots-list" id="botsList">
    <div class="no-bots" id="noBots">No bots running yet.</div>
  </div>
</div>

<!-- Logs -->
<div class="card">
  <div class="log-header">
    <div class="card-title">Live Logs</div>
    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>
  <div class="log-panel" id="logs">
    <div class="log-line">Waiting to start...</div>
  </div>
</div>

<script>
// ── Archetypes ──────────────────────────────────────────────
const ARCHETYPES = [
  {
    name: "GTO Bot",
    tag: "Balanced",
    avatar: "🤖",
    prompt: "Play GTO (Game Theory Optimal) poker. Use balanced ranges, mix value bets and bluffs at correct frequencies, apply correct preflop ranges based on position, use proper bet sizing, and make mathematically correct decisions."
  },
  {
    name: "Calling Station",
    tag: "Loose Passive",
    avatar: "📞",
    prompt: "You are a calling station. You love to call and hate folding — you always think your hand might be good enough. Rarely raise. Call down with any pair, any draw, or any hope of improving. Chase gutshots and backdoor draws regardless of pot odds. Never bluff."
  },
  {
    name: "Maniac",
    tag: "Loose Aggressive",
    avatar: "🔥",
    prompt: "You are a maniac — extremely loose and aggressive. Raise and re-raise constantly with a very wide range. Bluff frequently on all streets. Make large bets to put maximum pressure on opponents. 3-bet and 4-bet light. Be completely unpredictable and fearless."
  },
  {
    name: "Nit",
    tag: "Tight Passive",
    avatar: "🧊",
    prompt: "You are a nit — extremely tight and passive. Only play premium hands: AA, KK, QQ, JJ, AKs, AKo. Fold everything else preflop without hesitation. When you do play, bet for value only. Never bluff. Fold to any aggression unless you have the nuts."
  },
  {
    name: "TAG",
    tag: "Tight Aggressive",
    avatar: "🎯",
    prompt: "You are a tight aggressive player (TAG). Play a tight range of strong hands but play them aggressively. Always raise or fold preflop — never limp. Make continuation bets, apply pressure, and build pots with your good hands. Fold weak hands quickly."
  },
  {
    name: "Fish",
    tag: "Recreational",
    avatar: "🐟",
    prompt: "You are a recreational fish. Play too many hands including weak suited cards and low connectors. Chase flush draws and straight draws even with bad pot odds. Make random hero calls with weak hands. Occasionally bluff at random. Get excited by any pair."
  },
];

// Stable colour palette for bot labels in logs
const BOT_COLORS = [
  '#58a6ff','#3fb950','#f0883e','#bc8cff','#ff7b72','#79c0ff','#d2a8ff','#ffa657'
];
const botColorMap = {};
let colorIdx = 0;
function colorFor(id) {
  if (!botColorMap[id]) botColorMap[id] = BOT_COLORS[colorIdx++ % BOT_COLORS.length];
  return botColorMap[id];
}

const archetypesEl = document.getElementById('archetypes');
const strategyEl   = document.getElementById('strategy');
const randomBtn    = document.getElementById('randomBtn');
let activeIdx = -1;

function renderArchetypes() {
  archetypesEl.innerHTML = '';
  ARCHETYPES.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'archetype-card' + (i === activeIdx ? ' active' : '');
    card.innerHTML = `
      <span class="avatar">${a.avatar}</span>
      <div class="arch-name">${a.name}</div>
      <div class="arch-tag">${a.tag}</div>
    `;
    card.addEventListener('click', () => selectArchetype(i));
    archetypesEl.appendChild(card);
  });
}

function selectArchetype(i) {
  activeIdx = i;
  strategyEl.value = ARCHETYPES[i].prompt;
  renderArchetypes();
}

randomBtn.addEventListener('click', () => {
  randomBtn.classList.remove('spin');
  void randomBtn.offsetWidth;
  randomBtn.classList.add('spin');
  selectArchetype(Math.floor(Math.random() * ARCHETYPES.length));
});

renderArchetypes();

// ── Running bots UI ─────────────────────────────────────────
const botsListEl = document.getElementById('botsList');
const noBotsEl   = document.getElementById('noBots');

function updateNoBots() {
  const rows = botsListEl.querySelectorAll('.bot-row');
  noBotsEl.style.display = rows.length === 0 ? 'block' : 'none';
}

function addBotRow(id, name, tableUrl) {
  noBotsEl.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'bot-row';
  row.dataset.id = id;
  const color = colorFor(id);
  const shortUrl = tableUrl.replace('https://www.pokernow.com/games/', '…/');
  row.innerHTML = `
    <div class="bot-dot"></div>
    <div class="bot-info">
      <div class="bot-name" style="color:${color}">${name}</div>
      <div class="bot-url">${shortUrl}</div>
    </div>
    <div class="bot-tag">${id}</div>
    <button class="stop-btn">■ Stop</button>
  `;
  row.querySelector('.stop-btn').addEventListener('click', () => stopBot(id));
  botsListEl.insertBefore(row, noBotsEl);
}

function removeBotRow(id) {
  const row = botsListEl.querySelector(`[data-id="${id}"]`);
  if (row) row.remove();
  updateNoBots();
}

async function stopBot(id) {
  await fetch('/stop', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id }) });
  removeBotRow(id);
  addLog(id, id, '[server] stopped by user');
}

// ── Config pre-fill ──────────────────────────────────────────
const tableUrlEl = document.getElementById('tableUrl');
const botNameEl  = document.getElementById('botName');
const stackEl    = document.getElementById('stack');

fetch('/config').then(r => r.json()).then(cfg => {
  if (cfg.tableUrl) tableUrlEl.value = cfg.tableUrl;
  if (cfg.botName)  botNameEl.value  = cfg.botName;
  if (cfg.stack)    stackEl.value    = cfg.stack;

  if (cfg.strategy) {
    strategyEl.value = cfg.strategy;
    const match = ARCHETYPES.findIndex(a => a.prompt.trim() === cfg.strategy.trim());
    if (match !== -1) { activeIdx = match; renderArchetypes(); }
  }
  if (!cfg.tableUrl) tableUrlEl.style.borderColor = '#f85149';
});

// Restore any bots that were already running before this page load
fetch('/bots').then(r => r.json()).then(list => {
  list.forEach(b => addBotRow(b.id, b.name, b.tableUrl));
});

// ── Log panel ────────────────────────────────────────────────
const logsEl = document.getElementById('logs');

document.getElementById('clearBtn').addEventListener('click', () => {
  logsEl.innerHTML = '';
});

function addLog(id, name, msg) {
  const line = document.createElement('div');
  line.className = 'log-line';

  // Coloured bot label prefix
  const label = document.createElement('span');
  label.className = 'bot-label';
  label.style.background = colorFor(id) + '22';
  label.style.color = colorFor(id);
  label.style.border = `1px solid ${colorFor(id)}44`;
  label.textContent = name;
  line.appendChild(label);

  const text = document.createTextNode(msg);

  if      (msg.startsWith('[log]'))                              line.classList.add('gamelog');
  else if (msg.includes('✅') || msg.includes('♥') || msg.includes('Claude says')) line.classList.add('good');
  else if (msg.includes('⚠') || msg.includes('warn'))           line.classList.add('warn');
  else if (msg.includes('❌') || msg.includes('err]'))          line.classList.add('err');
  else if (msg.includes('action=') || msg.includes('MY TURN'))  line.classList.add('action');
  else if (msg.includes('[bot]') || msg.includes('[scrape]') || msg.includes('[executor]')) line.classList.add('info');

  line.appendChild(text);
  logsEl.appendChild(line);
  logsEl.scrollTop = logsEl.scrollHeight;
}

// ── SSE ──────────────────────────────────────────────────────
const evtSource = new EventSource('/logs');
evtSource.onmessage = e => {
  const { id, name, msg } = JSON.parse(e.data);
  if (msg === '__exited__') {
    removeBotRow(id);
    return;
  }
  addLog(id, name, msg);
};

// ── Launch ───────────────────────────────────────────────────
document.getElementById('launchBtn').addEventListener('click', async () => {
  const body = {
    tableUrl: tableUrlEl.value.trim(),
    botName:  botNameEl.value.trim() || 'PokerBot',
    stack:    parseInt(stackEl.value) || 1000,
    strategy: strategyEl.value.trim() || 'Play GTO poker.',
  };
  if (!body.tableUrl) { alert('Enter a Table URL'); return; }

  const arch = activeIdx >= 0 ? ARCHETYPES[activeIdx] : null;
  const res  = await fetch('/start', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await res.json();

  if (data.error) { addLog('sys', 'system', '❌ ' + data.error); return; }

  addBotRow(data.id, data.name, body.tableUrl);
  addLog(data.id, data.name, `Starting${arch ? ` as "${arch.name}" ${arch.avatar}` : ''}...`);
});
</script>
</body>
</html>
